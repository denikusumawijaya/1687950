<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Tutoring - Factoring Algebraic Expressions</title>
    
    <!-- Tailwind CSS for styling without scrolling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        /* Core constraints: No scroll, full viewport */
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
        }

        /* Animations to prevent boredom */
        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Option Button Styles */
        .option-btn {
            transition: all 0.2s ease;
            border: 2px solid #e5e7eb;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: translateX(5px);
        }
        .option-btn.selected {
            border-color: #3b82f6;
            background-color: #dbeafe;
        }
        .option-btn.correct {
            border-color: #22c55e;
            background-color: #dcfce7;
            color: #166534;
        }
        .option-btn.wrong {
            border-color: #ef4444;
            background-color: #fee2e2;
            color: #991b1b;
        }

        /* Math Font Adjustments */
        .katex { font-size: 1.15em !important; }
        
        /* Layout Structure */
        #app { display: flex; height: 100vh; width: 100vw; }
        #sidebar { width: 300px; background: linear-gradient(180deg, #1e3a8a 0%, #172554 100%); color: white; display: flex; flex-direction: column; z-index: 10; }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; background: #ffffff; }
        #content-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; position: relative; }
        #header-bar { height: 70px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 2rem; justify-content: space-between; background: #f9fafb; }
        #footer-bar { height: 80px; border-top: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 2rem; justify-content: space-between; background: #f9fafb; }
        
        .nav-item { padding: 1rem 1.5rem; cursor: pointer; transition: background 0.2s; border-left: 4px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: rgba(255,255,255,0.2); border-left-color: #3b82f6; font-weight: bold; }
        
        /* Custom Scrollbar for sidebar just in case */
        #sidebar-menu::-webkit-scrollbar { width: 6px; }
        #sidebar-menu::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <div id="sidebar" class="shadow-2xl">
            <div class="p-6 border-b border-blue-800">
                <h1 class="text-2xl font-bold tracking-wider"><i class="fas fa-square-root-variable mr-2"></i>MATH TUTORING</h1>
                <p class="text-blue-200 text-sm mt-1">by Deni</p>
            </div>
            <div id="sidebar-menu" class="flex-1 overflow-y-auto overflow-x-hidden text-sm">
                <!-- Nav items generated by JS -->
            </div>
        </div>

        <!-- Main Content Area -->
        <div id="main">
            <!-- Header (Progress & Reset) -->
            <div id="header-bar">
                <div class="flex-1 max-w-xl mr-8 hidden" id="progress-container">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span id="progress-text">Progress</span>
                        <span id="score-text"></span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3 shadow-inner">
                        <div id="progress-bar" class="bg-gradient-to-r from-blue-400 to-blue-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <div class="ml-auto">
                    <button onclick="resetSection()" class="px-4 py-2 bg-rose-50 text-rose-600 border border-rose-200 rounded-lg hover:bg-rose-100 transition shadow-sm hidden" id="btn-reset">
                        <i class="fas fa-rotate-left mr-2"></i> Reset Section
                    </button>
                </div>
            </div>

            <!-- Dynamic Screens -->
            <div id="content-area">
                <div id="screen-container" class="w-full max-w-4xl h-full flex flex-col justify-center">
                    <!-- Content populated by JS -->
                </div>
            </div>

            <!-- Footer Navigation -->
            <div id="footer-bar">
                <button onclick="navigate(-1)" id="btn-prev" class="px-6 py-3 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 transition shadow-sm hidden">
                    <i class="fas fa-chevron-left mr-2"></i> Previous
                </button>
                <button onclick="navigate(1)" id="btn-next" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-lg hidden shadow-blue-500/30">
                    Next <i class="fas fa-chevron-right ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================
           DATA & PROCEDURAL QUESTION GENERATOR
           ========================================== */
        
        // Helper to generate dynamic questions to ensure exactly 10 varied questions per section
        function generateQuestions(type, count, level = 1) {
            let qs = [];
            for(let i=1; i<=count; i++) {
                let v = (i * level) + 1; 
                let qData = {};
                
                if(type === 'warmup') {
                    if(i <= 3) {
                        qData = {
                            q: `What is the constant in the expression $${v+2}x^2 - ${v+1}x + ${v*4}$?`,
                            id: `Apa konstanta pada ekspresi tersebut?`,
                            options: [`$${v+2}$`, `$-${v+1}$`, `$${v*4}$`, `$x$`],
                            ans: 2,
                            exp: `The constant is the standalone number without a variable. Here, it is $${v*4}$.<br><small>Konstanta adalah angka tanpa variabel. Di sini adalah ${v*4}.</small>`
                        };
                    } else if (i <= 6) {
                        qData = {
                            q: `Identify the coefficient of $y$ in $${v}x + ${v+5}y - ${v*2}$.`,
                            id: `Sebutkan koefisien dari y pada ekspresi tersebut.`,
                            options: [`$${v}$`, `$${v+5}$`, `$-${v*2}$`, `$y$`],
                            ans: 1,
                            exp: `The coefficient is the number multiplying the variable. For $y$, it is $${v+5}$.<br><small>Koefisien adalah angka pengali variabel. Untuk y, angkanya adalah ${v+5}.</small>`
                        };
                    } else {
                        qData = {
                            q: `Translate into algebra: "${v} more than ${v+1} times the number of marbles ($n$)"`,
                            id: `Ubah kalimat ini menjadi aljabar: "${v} lebihnya dari ${v+1} kali jumlah kelereng (n)"`,
                            options: [`$${v+1}n + ${v}$`, `$${v}n + ${v+1}$`, `$n + ${v+1}$`, `$${v+1}(n + ${v})$`],
                            ans: 0,
                            exp: `"${v+1} times the number" is $${v+1}n$. "${v} more than" means adding ${v}. So, $${v+1}n + ${v}$.<br><small>"${v+1} kali" adalah ${v+1}n. "${v} lebihnya" berarti ditambah ${v}.</small>`
                        };
                    }
                } 
                else if (type === 'gcf') { // Prior Knowledge
                    let gcf = v + 1;
                    let a = gcf * 2; let b = gcf * 3;
                    qData = {
                        q: `Find the Greatest Common Factor (GCF) of $${a}x$ and $${b}x^2$.`,
                        id: `Tentukan FPB dari $${a}x$ dan $${b}x^2$.`,
                        options: [`$${gcf}x$`, `$${a}x$`, `$${gcf}x^2$`, `$${b}x$`],
                        ans: 0,
                        exp: `The largest number dividing ${a} and ${b} is ${gcf}. The lowest power of $x$ is $x$. So, GCF is $${gcf}x$.<br><small>Angka terbesar pembagi ${a} dan ${b} adalah ${gcf}. Pangkat x terkecil adalah x. Jadi FPB = ${gcf}x.</small>`
                    };
                }
                else if (type === 'extract') { // Problem Intro
                    let c = v + 2;
                    let a = c * 2; let b = c * 3;
                    qData = {
                        q: `Factor out the GCF: $${a}x^2y - ${b}xy^2$`,
                        id: `Faktorkan Keluar FPB-nya.`,
                        options: [
                            `$${c}xy(2x - 3y)$`, 
                            `$${c}xy(3x - 2y)$`, 
                            `$${c}x^2y(2 - 3y)$`, 
                            `$${a}xy(x - y)$`
                        ],
                        ans: 0,
                        exp: `The GCF of ${a} and ${b} is ${c}. The common variables are $x$ and $y$. Extracting $${c}xy$ leaves $(2x - 3y)$.<br><small>Tarik keluar 'DNA' yang sama yaitu ${c}xy.</small>`
                    };
                }
                else if (type === 'squares') { // Guided Practice
                    let base = v + 1;
                    let sq = base * base;
                    qData = {
                        q: `Factor using Difference of Two Squares: $x^2 - ${sq}$`,
                        id: `Faktorkan dengan metode Selisih Dua Kuadrat.`,
                        options: [
                            `$(x - ${base})(x + ${base})$`, 
                            `$(x - ${base})^2$`, 
                            `$(x + ${base})^2$`, 
                            `$x(x - ${sq})$`
                        ],
                        ans: 0,
                        exp: `Use $a^2 - b^2 = (a-b)(a+b)$. Here, $a=x$ and $b=${base}$. Thus, $(x-${base})(x+${base})$.<br><small>Polanya selalu (a+b)(a-b).</small>`
                    };
                }
                else if (type === 'independent') {
                    if(i%2===0) {
                        let c = v+1; let sq = c*c;
                        qData = {
                            q: `Solve for $x$: $x^2 - ${sq} = 0$`,
                            id: `Cari nilai x dari persamaan tersebut.`,
                            options: [`$x = \\pm ${c}$`, `$x = ${c}$`, `$x = -${c}$`, `$x = ${sq}$`],
                            ans: 0,
                            exp: `Factor to $(x-${c})(x+${c}) = 0$, so $x = ${c}$ or $x = -${c}$.<br><small>Faktorkan dulu, lalu setiap kurung disamakan dengan 0.</small>`
                        };
                    } else {
                        let a = v*3; let b = v*4;
                        qData = {
                            q: `Factor completely: $${a}m^2n - ${b}mn^2$`,
                            id: `Faktorkan secara penuh.`,
                            options: [
                                `$${v}mn(3m - 4n)$`,
                                `$${v}m^2n(3 - 4n)$`,
                                `$${v}mn(4m - 3n)$`,
                                `$mn(${a}m - ${b}n)$`
                            ],
                            ans: 0,
                            exp: `The GCF is $${v}mn$. Factoring it out leaves $(3m - 4n)$.<br><small>Keluarkan faktor yang sama dari angka dan hurufnya.</small>`
                        };
                    }
                }
                else if (type === 'assignment') {
                    let a = v+2; let sqA = a*a;
                    let b = v+3; let sqB = b*b;
                    qData = {
                        q: `Factor completely: $${sqA}y^2 - ${sqB}z^2$`,
                        id: `Faktorkan bentuk berikut sepenuhnya.`,
                        options: [
                            `$(${a}y - ${b}z)(${a}y + ${b}z)$`,
                            `$(${a}y - ${b}z)^2$`,
                            `$(${sqA}y - ${sqB}z)(y + z)$`,
                            `$y z (${sqA}y - ${sqB}z)$`
                        ],
                        ans: 0,
                        exp: `$${sqA}y^2 = (${a}y)^2$ and $${sqB}z^2 = (${b}z)^2$. Apply $(a-b)(a+b)$.<br><small>Terapkan rumus selisih dua kuadrat.</small>`
                    };
                }
                qs.push(qData);
            }
            return qs;
        }

        const sectionsData = [
            {
                id: 'home',
                title: 'Home',
                time: '',
                type: 'home'
            },
            {
                id: 's1',
                title: '1. Spiral Review Warm-up',
                time: '00:00 - 00:10',
                type: 'lesson',
                theoryEN: "Welcome to the Loading Screen! 🚀<br><br>Let's ensure your basic math 'skills' are fully active before we level up today. We will review constants, coefficients, and translating sentences into algebra.",
                theoryID: "Halo! Senang bertemu lagi. Sebelum masuk ke level baru, ayo lalui 'Loading Screen' tantangan ini dulu untuk memastikan 'skill' dasar kamu sudah aktif.",
                questions: generateQuestions('warmup', 10)
            },
            {
                id: 's2',
                title: '2. Intro & Connection',
                time: '00:10 - 00:15',
                type: 'lesson',
                theoryEN: "Zipping Files & Code 💾<br><br>Have you ever wondered how massive games run without lagging? Programmers compress long code to make computers work faster. Factoring is like 'zipping' a file. We will learn to spot hidden patterns in numbers to solve complex problems simply.",
                theoryID: "Pernahkah kamu bertanya bagaimana game besar berjalan tanpa lag? Pemfaktoran itu seperti 'zipping' file. Kita akan belajar melihat pola tersembunyi agar bisa menyelesaikan masalah kompleks dengan simpel.",
                questions: generateQuestions('warmup', 10, 2) // Reuse warmup style for conceptual intro
            },
            {
                id: 's3',
                title: '3. Prior Knowledge',
                time: '00:15 - 00:20',
                type: 'lesson',
                theoryEN: "The Greatest Common Factor (GCF) 🧠<br><br>Before we go pro, remember GCF? What is the largest number that divides 12 and 18? Correct, 6! In algebra, we do the same for variables. For $x^2$ and $x$, the greatest factor is $x$.",
                theoryID: "Sebelum ke teknik pro, ingat FPB (Faktor Persekutuan Terbesar)? Kalau ada 12 dan 18, angka pembagi terbesarnya 6. Di aljabar, kita lakukan hal yang sama pada variabel.",
                questions: generateQuestions('gcf', 10)
            },
            {
                id: 's4',
                title: '4. Problem Intro',
                time: '00:20 - 00:30',
                type: 'lesson',
                theoryEN: "Extracting the DNA 🧬 & Magic Squares 🔲<br><br>Consider $12x^2y - 18xy^2$. We use the 'Factor Out' method—pulling out the same 'DNA' from each term.<br><br>Next is the Difference of Two Squares: $a^2 - b^2 = (a+b)(a-b)$. Example: $x^2 - 16$. Since 16 is $4^2$, the pattern is always $(x+4)(x-4)$.",
                theoryID: "Kita gunakan metode 'Faktorkan Keluar', menarik 'DNA' yang sama. Lalu 'Magic Square' atau Selisih Dua Kuadrat. Polanya selalu (a+b)(a-b).",
                questions: generateQuestions('extract', 10)
            },
            {
                id: 's5',
                title: '5. Guided Practice',
                time: '00:30 - 00:45',
                type: 'lesson',
                theoryEN: "Let's try it together! 🤝<br><br>I will take one step, and you continue the next. Look at $4x^2 - 100$. Is it a difference of two squares? Yes! Because $4x^2$ is $(2x)^2$ and 100 is $10^2$.",
                theoryID: "Ayo coba bersama di layar. Saya mulai satu langkah, kamu lanjutkan. Coba terapkan pola yang baru saja kita pelajari!",
                questions: generateQuestions('squares', 10)
            },
            {
                id: 's6',
                title: '6. Independent Practice',
                time: '00:45 - 01:00',
                type: 'lesson',
                theoryEN: "Boss Level! 👾<br><br>This is your time to shine. Work through these problems carefully. If you get stuck, use the hints we practiced earlier.",
                theoryID: "Ini adalah 'Boss Level' untuk kamu! Kerjakan sendiri, pilih jawaban yang paling tepat. Ingat semua skill yang sudah diaktifkan.",
                questions: generateQuestions('independent', 10)
            },
            {
                id: 's7',
                title: '7. Assignments',
                time: 'Assessment',
                type: 'assignment',
                theoryEN: "Final Challenge Arena 🏆<br><br>You have 5 Assignment Groups. Each group contains 10 varied questions. Your score will be recorded and you can print the result after completing a group.",
                theoryID: "Ujian Akhir! Ada 5 Grup Tugas. Nilai akan dicetak di akhir setiap grup.",
                groups: [
                    generateQuestions('assignment', 10, 1),
                    generateQuestions('assignment', 10, 2),
                    generateQuestions('assignment', 10, 3),
                    generateQuestions('assignment', 10, 4),
                    generateQuestions('assignment', 10, 5)
                ]
            },
            {
                id: 's8',
                title: '8. Consolidation',
                time: '01:00 - 01:05',
                type: 'end'
            }
        ];

        /* ==========================================
           STATE MANAGEMENT
           ========================================== */
        let state = {
            sectionIdx: 0,
            subIdx: 0, // 0 = Theory, 1-10 = Questions, 11 = Result
            assignmentGroupIdx: 0, // 0 to 4
            userAnswers: {}, // Format: "sectionId_qIndex": { selected, correct }
            studentName: "Student"
        };

        /* ==========================================
           UI RENDERING LOGIC
           ========================================== */
        
        function initApp() {
            buildSidebar();
            renderCurrentScreen();
            
            // Ask for student name for assignments
            setTimeout(() => {
                let name = prompt("Welcome! Please enter your name for the assessment reports:", "");
                if(name && name.trim() !== "") state.studentName = name.trim();
            }, 500);
        }

        function buildSidebar() {
            const menu = document.getElementById('sidebar-menu');
            menu.innerHTML = '';
            sectionsData.forEach((sec, idx) => {
                let activeClass = idx === state.sectionIdx ? 'active' : '';
                menu.innerHTML += `
                    <div class="nav-item flex justify-between items-center ${activeClass}" onclick="jumpToSection(${idx})">
                        <span>${sec.title}</span>
                        <span class="text-xs text-blue-300 ml-2 whitespace-nowrap">${sec.time}</span>
                    </div>
                `;
            });
        }

        function jumpToSection(idx) {
            state.sectionIdx = idx;
            state.subIdx = 0;
            if(sectionsData[idx].type === 'assignment') state.assignmentGroupIdx = 0;
            buildSidebar();
            renderCurrentScreen();
        }

        function updateProgressUI(totalItems, currentItem) {
            const progCont = document.getElementById('progress-container');
            if(sectionsData[state.sectionIdx].type === 'home' || sectionsData[state.sectionIdx].type === 'end') {
                progCont.classList.add('hidden');
                document.getElementById('btn-reset').classList.add('hidden');
                return;
            }
            progCont.classList.remove('hidden');
            document.getElementById('btn-reset').classList.remove('hidden');
            
            let pct = (currentItem / totalItems) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('progress-text').innerText = `Progress: Step ${currentItem} of ${totalItems}`;
            
            // Calculate score for current section
            let secId = getUniqueSectionId();
            let score = 0;
            let answered = 0;
            for(let i=0; i<10; i++) {
                let ans = state.userAnswers[`${secId}_${i}`];
                if(ans) {
                    answered++;
                    if(ans.selected === ans.correct) score++;
                }
            }
            document.getElementById('score-text').innerText = answered > 0 ? `Score: ${score}/${answered}` : '';
        }

        function getUniqueSectionId() {
            let sec = sectionsData[state.sectionIdx];
            if(sec.type === 'assignment') return `${sec.id}_g${state.assignmentGroupIdx}`;
            return sec.id;
        }

        function renderCurrentScreen() {
            const container = document.getElementById('screen-container');
            const sec = sectionsData[state.sectionIdx];
            container.innerHTML = '';
            
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');

            // Control Navigation Buttons
            btnPrev.classList.remove('hidden');
            btnNext.classList.remove('hidden');
            if(state.sectionIdx === 0 && state.subIdx === 0) btnPrev.classList.add('hidden');
            
            if(sec.type === 'home') {
                updateProgressUI(0,0);
                container.innerHTML = `
                    <div class="text-center fade-in">
                        <i class="fas fa-graduation-cap text-6xl text-blue-600 mb-6 pop-in"></i>
                        <h1 class="text-5xl font-extrabold text-gray-800 mb-4 tracking-tight">MATH TUTORING</h1>
                        <h2 class="text-2xl text-gray-600 mb-1">Topic: Factoring Algebraic Expressions</h2>
                        <h3 class="text-lg text-gray-400 mb-10 italic">Topik: Pemfaktoran Bentuk Aljabar</h3>
                        
                        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 max-w-lg mx-auto text-left">
                            <h4 class="font-bold text-lg mb-4 text-blue-800"><i class="fas fa-clipboard-list mr-2"></i>Class Rules / Aturan Kelas:</h4>
                            <ul class="space-y-4">
                                <li class="flex items-start"><i class="fas fa-microphone text-green-500 mt-1 mr-3"></i> <div>Take turns speaking.<br><small class="text-gray-500">Berbicara secara bergantian.</small></div></li>
                                <li class="flex items-start"><i class="fas fa-hand-paper text-orange-500 mt-1 mr-3"></i> <div>Ask permission to leave.<br><small class="text-gray-500">Meminta izin ketika ingin meninggalkan kelas.</small></div></li>
                                <li class="flex items-start"><i class="fas fa-video text-blue-500 mt-1 mr-3"></i> <div>Turn on camera & mic when needed.<br><small class="text-gray-500">Menyalakan kamera dan microphone jika diperlukan.</small></div></li>
                            </ul>
                        </div>
                    </div>
                `;
            } 
            else if (sec.type === 'end') {
                updateProgressUI(0,0);
                btnNext.classList.add('hidden');
                container.innerHTML = `
                    <div class="text-center fade-in">
                        <i class="fas fa-trophy text-7xl text-yellow-400 mb-6 pop-in"></i>
                        <h2 class="text-4xl font-bold text-gray-800 mb-4">Excellent Work!</h2>
                        <p class="text-xl text-gray-600 mb-2">You've mastered breaking down complex expressions.</p>
                        <p class="text-md text-gray-500 mb-10 italic">Luar biasa! Kamu sudah menguasai teknik memecah ekspresi rumit.</p>
                        
                        <button onclick="window.open('https://learn.algonova.id/login', '_blank')" class="px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-xl rounded-2xl shadow-xl hover:scale-105 transition transform">
                            <i class="fas fa-rocket mr-2"></i> Go to Learning Portal
                        </button>
                    </div>
                `;
            }
            else {
                // Lesson or Assignment
                let questions = sec.type === 'assignment' ? sec.groups[state.assignmentGroupIdx] : sec.questions;
                let totalItems = questions.length + (sec.theoryEN ? 1 : 0) + (sec.type === 'assignment' ? 1 : 0); // +1 for theory, +1 for result if assignment
                
                updateProgressUI(totalItems, state.subIdx + 1);

                if(state.subIdx === 0 && sec.theoryEN) {
                    // Render Theory
                    let groupBadge = sec.type === 'assignment' ? `<div class="inline-block bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm font-bold mb-4">Group ${state.assignmentGroupIdx + 1} of 5</div>` : '';
                    container.innerHTML = `
                        <div class="fade-in bg-white p-10 rounded-3xl shadow-xl border border-gray-100 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                            ${groupBadge}
                            <h2 class="text-3xl font-bold text-gray-800 mb-6">${sec.title}</h2>
                            <div class="text-xl text-gray-700 leading-relaxed mb-6">
                                ${sec.theoryEN}
                            </div>
                            <hr class="my-6">
                            <div class="text-lg text-gray-500 leading-relaxed italic border-l-4 border-gray-200 pl-4">
                                ${sec.theoryID}
                            </div>
                        </div>
                    `;
                } 
                else if (state.subIdx > 0 && state.subIdx <= questions.length) {
                    // Render Question
                    let qIdx = state.subIdx - 1;
                    let qData = questions[qIdx];
                    let uAns = state.userAnswers[`${getUniqueSectionId()}_${qIdx}`];
                    
                    let optionsHTML = '';
                    qData.options.forEach((opt, idx) => {
                        let btnClass = "option-btn w-full text-left p-4 rounded-xl mb-3 text-lg font-medium shadow-sm bg-white";
                        let icon = "";
                        
                        if(uAns) {
                            if(idx === qData.ans) {
                                btnClass += " correct";
                                icon = `<i class="fas fa-check-circle float-right mt-1"></i>`;
                            } else if (idx === uAns.selected) {
                                btnClass += " wrong";
                                icon = `<i class="fas fa-times-circle float-right mt-1"></i>`;
                            } else {
                                btnClass += " opacity-50 cursor-not-allowed";
                            }
                        }
                        
                        let disabled = uAns ? 'disabled' : '';
                        optionsHTML += `<button class="${btnClass}" onclick="selectAnswer(${qIdx}, ${idx}, ${qData.ans})" ${disabled}>
                            <span class="mr-3 text-gray-400 font-bold">${String.fromCharCode(65+idx)}.</span> 
                            ${opt} ${icon}
                        </button>`;
                    });

                    let expHTML = '';
                    if(uAns) {
                        expHTML = `
                            <div class="mt-6 bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg fade-in">
                                <h4 class="font-bold text-blue-800 mb-2"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i> Explanation / Penjelasan</h4>
                                <p class="text-blue-900">${qData.exp}</p>
                            </div>
                        `;
                        // Auto-enable next if answered
                        btnNext.classList.add('animate-pulse');
                    } else {
                        btnNext.classList.remove('animate-pulse');
                    }

                    container.innerHTML = `
                        <div class="fade-in w-full max-w-3xl mx-auto">
                            <div class="mb-8">
                                <span class="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full mb-4 inline-block shadow-sm">
                                    Question ${qIdx + 1} / ${questions.length}
                                </span>
                                <h3 class="text-2xl font-semibold text-gray-800 mb-2">${qData.q}</h3>
                                <p class="text-gray-500 italic border-l-2 border-gray-300 pl-3">${qData.id}</p>
                            </div>
                            <div class="grid grid-cols-1 gap-2">
                                ${optionsHTML}
                            </div>
                            ${expHTML}
                        </div>
                    `;
                }
                else if (sec.type === 'assignment' && state.subIdx === questions.length + 1) {
                    // Assignment Result Screen
                    let score = 0;
                    for(let i=0; i<10; i++) {
                        let ans = state.userAnswers[`${getUniqueSectionId()}_${i}`];
                        if(ans && ans.selected === ans.correct) score++;
                    }
                    
                    container.innerHTML = `
                        <div class="text-center fade-in bg-white p-12 rounded-3xl shadow-xl border border-gray-100">
                            <i class="fas fa-file-signature text-6xl text-purple-600 mb-6"></i>
                            <h2 class="text-3xl font-bold text-gray-800 mb-2">Group ${state.assignmentGroupIdx + 1} Completed!</h2>
                            <p class="text-xl text-gray-600 mb-8">Score: <span class="font-bold text-3xl text-blue-600">${score}/10</span></p>
                            
                            <button onclick="printResult()" class="px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition mx-2">
                                <i class="fas fa-print mr-2"></i> Print Result
                            </button>
                            
                            ${state.assignmentGroupIdx < 4 ? `
                                <button onclick="nextAssignmentGroup()" class="px-6 py-3 bg-green-500 text-white font-bold rounded-xl shadow-lg hover:bg-green-600 transition mx-2 mt-4 md:mt-0">
                                    Next Group <i class="fas fa-arrow-right ml-2"></i>
                                </button>
                            ` : ''}
                        </div>
                    `;
                    // Hide main next button on result screen to force interaction with big buttons
                    btnNext.classList.add('hidden'); 
                }
            }

            // Render Math
            setTimeout(() => {
                renderMathInElement(document.getElementById('content-area'), {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }, 50);
        }

        /* ==========================================
           INTERACTION & LOGIC
           ========================================== */

        function selectAnswer(qIdx, selectedIdx, correctIdx) {
            let uid = `${getUniqueSectionId()}_${qIdx}`;
            if(state.userAnswers[uid]) return; // Already answered
            
            state.userAnswers[uid] = { selected: selectedIdx, correct: correctIdx };
            renderCurrentScreen();
        }

        function resetSection() {
            if(confirm("Are you sure you want to reset all answers in this section?")) {
                let secId = getUniqueSectionId();
                for(let key in state.userAnswers) {
                    if(key.startsWith(secId + "_")) delete state.userAnswers[key];
                }
                state.subIdx = 0;
                renderCurrentScreen();
            }
        }

        function nextAssignmentGroup() {
            state.assignmentGroupIdx++;
            state.subIdx = 0;
            renderCurrentScreen();
        }

        function navigate(dir) {
            const sec = sectionsData[state.sectionIdx];
            
            let questions = sec.type === 'assignment' ? sec.groups[state.assignmentGroupIdx] : sec.questions;
            let maxSubIdx = 0;
            if (sec.type === 'lesson') maxSubIdx = questions.length; // Theory + 10Qs = max idx 10
            if (sec.type === 'assignment') maxSubIdx = questions.length + 1; // Theory + 10Qs + Result = max idx 11

            state.subIdx += dir;

            if (state.subIdx < 0) {
                // Go to previous section
                if (state.sectionIdx > 0) {
                    state.sectionIdx--;
                    let pSec = sectionsData[state.sectionIdx];
                    if(pSec.type === 'assignment') {
                        state.assignmentGroupIdx = 4; // go to last group
                        state.subIdx = pSec.groups[4].length + 1; // jump to end of it
                    } else if (pSec.type === 'lesson') {
                        state.subIdx = pSec.questions.length;
                    } else {
                        state.subIdx = 0;
                    }
                    buildSidebar();
                } else {
                    state.subIdx = 0;
                }
            } 
            else if (state.subIdx > maxSubIdx) {
                // Go to next section
                if (state.sectionIdx < sectionsData.length - 1) {
                    state.sectionIdx++;
                    state.subIdx = 0;
                    if(sectionsData[state.sectionIdx].type === 'assignment') state.assignmentGroupIdx = 0;
                    buildSidebar();
                } else {
                    state.subIdx = maxSubIdx;
                }
            }

            renderCurrentScreen();
        }

        /* ==========================================
           PRINTING FEATURE
           ========================================== */

        function printResult() {
            let sec = sectionsData[state.sectionIdx];
            let qs = sec.groups[state.assignmentGroupIdx];
            
            let dateStr = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            let tableRows = '';
            let score = 0;
            
            qs.forEach((q, idx) => {
                let ans = state.userAnswers[`${getUniqueSectionId()}_${idx}`];
                let userTxt = "-";
                let corTxt = q.options[q.ans];
                let mark = `<span style="color: red;">x</span>`;
                
                if(ans) {
                    userTxt = q.options[ans.selected];
                    if(ans.selected === ans.correct) {
                        score++;
                        mark = `<span style="color: green;">v</span>`;
                    }
                }
                
                tableRows += `
                    <tr>
                        <td style="text-align: center; border: 1px solid #ddd; padding: 8px;">${idx + 1}</td>
                        <td style="border: 1px solid #ddd; padding: 8px;">${q.q}</td>
                        <td style="border: 1px solid #ddd; padding: 8px;">${userTxt}</td>
                        <td style="border: 1px solid #ddd; padding: 8px;">${corTxt}</td>
                        <td style="text-align: center; border: 1px solid #ddd; padding: 8px; font-weight: bold;">${mark}</td>
                    </tr>
                `;
            });

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Assessment Result - ${state.studentName}</title>
                    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
                    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"><\/script>
                    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" 
                            onload="renderMathInElement(document.body); setTimeout(()=>window.print(), 500);"><\/script>
                    <style>
                        body { font-family: 'Arial', sans-serif; padding: 40px; color: #333; max-width: 900px; margin: auto; }
                        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; text-align: center; }
                        .header-info { margin-bottom: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
                        .header-info div { padding: 5px 0; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
                        th { background-color: #f4f4f4; border: 1px solid #ddd; padding: 12px; text-align: left; }
                        .signature { margin-top: 50px; text-align: right; }
                        .score-box { text-align: right; font-size: 1.5em; font-weight: bold; padding: 20px 0; }
                    </style>
                </head>
                <body>
                    <h1>ASSESSMENT RESULT</h1>
                    <div class="header-info">
                        <div><strong>Name:</strong> ${state.studentName}</div>
                        <div><strong>Date:</strong> ${dateStr}</div>
                        <div><strong>Topic:</strong> Factoring Algebraic Expressions</div>
                        <div><strong>Assessment group:</strong> Group ${state.assignmentGroupIdx + 1}</div>
                    </div>
                    
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 5%">No.</th>
                                <th style="width: 40%">Question</th>
                                <th style="width: 20%">Student Answer</th>
                                <th style="width: 20%">Correct Answer</th>
                                <th style="width: 15%; text-align: center;">Note (v/x)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                    
                    <div class="score-box">
                        Total Score = ${score}/10
                    </div>

                    <div class="signature">
                        <p>Checked by,</p>
                        <br><br><br>
                        <p><strong>Deni</strong></p>
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        // Initialize App
        window.onload = initApp;
    </script>
</body>
</html>
